<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #1f2937;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .top-bar {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #1d4ed8;
        }

    </style>
</head>

<body>

<h2>Admin Dashboard - Student Results</h2>

<div class="top-bar">
    <button onclick="window.location.href='/export_csv'">
        Export Results to CSV
    </button>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Email</th>
        <th>Score</th>
        <th>Result</th>
        <th>Warnings</th>
        <th>Submission Type</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student['name'] }}</td>
        <td>{{ student['roll'] }}</td>
        <td>{{ student['email'] }}</td>
        <td>{{ student['score'] }}</td>
        <td>{{ student['result'] }}</td>
        <td>{{ student['warnings'] }}</td>
        <td>{{ student['reason'] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
